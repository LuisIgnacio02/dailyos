<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily OS · Luis Ignacio Cepeda Morales</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='0' fill='%232a251f'/><path d='M7 10l2.5 2.5L14 7' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/><line x1='17' y1='10' x2='26' y2='10' stroke='white' stroke-width='2' stroke-linecap='round'/><path d='M7 17l2.5 2.5L14 14' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/><line x1='17' y1='17' x2='24' y2='17' stroke='white' stroke-width='2' stroke-linecap='round'/><path d='M7 24l2.5 2.5L14 21' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/><line x1='17' y1='24' x2='21' y2='24' stroke='white' stroke-width='2' stroke-linecap='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* Surface scale */
  --bg:        #f0ebdd;
  --surface:   #fdfbf7;
  --surface-2: #e8e1d1;
  --surface-3: #d1c7b3;

  /* Text */
  --t1: #2a251f;
  --t2: #4a443b;
  --t3: #6b6357;
  --t4: #8a8377;

  /* Borders */
  --border:   #2a251f;
  --border-h: #000000;

  /* Accents mapped for JS classes */
  --accent:    #b04a2a;
  --accent-bg: rgba(176, 74, 42, 0.1);
  --accent-bd: rgba(176, 74, 42, 0.4);

  --blue: #2c5282;
  --blue-bg: rgba(44, 82, 130, 0.1);
  --blue-bd: rgba(44, 82, 130, 0.4);
  
  --green: #15803d;
  --green-bg: rgba(21, 128, 61, 0.1);
  --green-bd: rgba(21, 128, 61, 0.4);

  --mono:  'DM Mono', 'Courier New', monospace;
  --sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --serif: 'Fraunces', Georgia, serif;

  --r:   0px; 
  --rs:  0px;
  --sh:  none;
  --shm: 4px 4px 0px rgba(42, 37, 31, 0.15);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:13px;min-height:100vh;padding-bottom:120px;}

/* ── HEADER ── */
.g-header{background:var(--bg);border-bottom:3px solid var(--border);border-top:3px solid var(--border);padding:10px 32px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:20px;height:85px;}
.hdr-brand{display:flex;flex-direction:column;justify-content:center;}
.brand-meta{font-size:10px;color:var(--t3);letter-spacing:0.15em;text-transform:uppercase;font-family:var(--sans);border-bottom:1px solid var(--border);padding-bottom:2px;margin-bottom:4px;font-weight:700;}
.brand-name{font-family:var(--serif);font-size:32px;font-weight:400;font-style:italic;letter-spacing:-0.02em;color:var(--t1);line-height:1.1;}
.hdr-stats{display:flex;height:100%;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.hdr-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px;border-right:1px solid var(--border);height:100%;}
.hdr-stat:last-child{border-right:none;}
.hdr-stat-n{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--t1);line-height:1;}
.hdr-stat-l{font-size:9px;color:var(--t2);letter-spacing:0.1em;margin-top:4px;text-transform:uppercase;font-weight:700;font-family:var(--sans);}
.hdr-actions{display:flex;gap:12px;align-items:center;}

/* ── MAIN GRID ── */
.main-content{max-width:1400px;margin:0 auto;padding:32px 24px 40px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start;}
@media(max-width:960px){.main-content{grid-template-columns:1fr;}}
.main-content.rest-layout .rest-banner{grid-column:1/-1;}
.heatmap-section{grid-column:1/-1;}

/* ── TIER CARD ── */
.tier-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shm);overflow:hidden;transition:transform 0.1s,box-shadow 0.1s;}
.tier-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0px rgba(42,37,31,0.25);border-color:var(--border-h);}
.tier-card.locked-tier{background:var(--surface-2);box-shadow:none;}
.tier-card.locked-tier:hover{transform:none;box-shadow:none;border-color:var(--border);}
.tier-header-bar{padding:14px 20px 13px;border-bottom:3px solid var(--border);display:flex;align-items:center;gap:12px;}
.tier-badge{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:var(--rs);border:1px solid var(--border);white-space:nowrap;font-family:var(--sans);}
.tier-badge.t1{background:var(--accent-bg);color:var(--t1);}
.tier-badge.t2{background:var(--blue-bg);color:var(--t1);}
.tier-badge.t3{background:var(--green-bg);color:var(--t1);}
.tier-badge.tlock{background:var(--surface-3);color:var(--t1);}
.tier-title{font-size:20px;font-weight:400;color:var(--t1);flex:1;font-family:var(--serif);font-style:italic;}
.tier-subtitle{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--sans);}
.tier-body{padding:20px;}

/* ── LOCK NOTICE ── */
.lock-notice{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--surface-2);border:1px dashed var(--border);border-radius:var(--rs);margin-bottom:16px;}
.lock-notice-icon{font-size:16px;line-height:1.4;flex-shrink:0;}
.lock-notice-text{font-size:13px;color:var(--t2);line-height:1.5;font-family:var(--sans);}
.lock-notice-text strong{color:var(--t1);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:0.05em;}

/* ── CHECK ITEMS ── */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface-2);margin-bottom:8px;transition:transform 0.1s,box-shadow 0.1s,background 0.1s,border-color 0.1s;cursor:pointer;user-select:none;box-shadow:2px 2px 0px rgba(42,37,31,0.1);}
.check-item:hover:not(.locked):not(.editing){background:var(--surface);transform:translate(-1px,-1px);box-shadow:3px 3px 0px rgba(42,37,31,0.2);border-color:var(--border-h);}
.check-item.done{border-color:var(--border);background:var(--green-bg);}
.check-item.locked{opacity:0.6;pointer-events:none;box-shadow:none;}
.check-item.editing{cursor:default;background:var(--surface);border-color:var(--accent);box-shadow:none;}
.check-box{width:18px;height:18px;border-radius:0;border:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.1s;box-shadow:inset 1px 1px 2px rgba(0,0,0,0.05);}
.check-item.done .check-box{background:var(--green);border-color:var(--border);box-shadow:none;}
.check-label{flex:1;font-size:14px;font-weight:600;color:var(--t1);line-height:1.3;font-family:var(--sans);}
.check-item.done .check-label{color:var(--t3);text-decoration:line-through;opacity:0.8;}
.check-item .item-actions{display:flex;gap:6px;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
.check-item:hover:not(.locked):not(.editing) .item-actions{opacity:1;}

/* ── GYM / RUN ── */
.gr-row{display:flex;gap:12px;margin-bottom:8px;}
.gr-row .check-item{flex:1;margin-bottom:0;}
.gr-hint{font-size:11px;color:var(--t3);margin:0 0 12px 2px;font-family:var(--serif);font-style:italic;}

/* ── IFOM SCORE ── */
.ifom-score-row{display:flex;align-items:center;gap:12px;padding:6px 12px 10px 42px;margin-top:-6px;margin-bottom:8px;}
.ifom-score-label{font-size:11px;color:var(--t1);font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:0.05em;}
.ifom-score-input{width:80px!important;padding:6px 10px!important;font-size:14px!important;font-family:var(--mono)!important;font-weight:500!important;background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:0!important;color:var(--t1)!important;outline:none!important;transition:border-color 0.15s,background 0.15s!important;box-shadow:inset 1px 1px 3px rgba(0,0,0,0.05)!important;}
.ifom-score-input:focus{border-color:var(--accent)!important;background:#fff!important;box-shadow:inset 2px 2px 0px rgba(176,74,42,0.1)!important;}
.ifom-score-pct{font-size:13px;font-weight:700;color:var(--t1);}

/* ── INLINE INPUT ── */
.inline-input{flex:1;padding:6px 10px;font-size:13px;font-family:var(--sans);background:var(--surface);border:1px solid var(--border);border-radius:0;color:var(--t1);outline:none;transition:border-color 0.15s,background 0.15s;min-width:0;box-shadow:inset 1px 1px 3px rgba(0,0,0,0.05);}
.inline-input:focus{border-color:var(--accent);background:#fff;box-shadow:inset 2px 2px 0px rgba(176,74,42,0.1);}

/* ── SUCCESS NOTICE ── */
.success-notice{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--green-bg);border:1px solid var(--border);border-radius:var(--rs);margin-top:16px;animation:fadeSlide 0.3s ease;box-shadow:2px 2px 0px rgba(42,37,31,0.1);}
.success-notice-text{font-size:13px;font-weight:700;color:var(--green);font-family:var(--sans);}

/* ── PARTIAL UNLOCK NOTICE ── */
.partial-notice{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--blue-bg);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:16px;box-shadow:2px 2px 0px rgba(42,37,31,0.1);}
.partial-notice-text{font-size:13px;font-weight:700;color:var(--blue);font-family:var(--sans);}

/* ── TIMER ── */
.timer-section{margin-top:16px;padding-top:16px;border-top:1px dashed var(--border);}
.timer-label{font-size:10px;color:var(--t1);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.timer-row{display:flex;align-items:center;gap:20px;}
.timer-clock{font-family:var(--mono);font-size:48px;font-weight:400;letter-spacing:-0.05em;color:var(--t1);line-height:1;min-width:136px;transition:color 0.3s;}
.timer-clock.running{color:var(--accent);}
.timer-clock.done{color:var(--green);}

/* ── BUTTONS ── */
.btn{border-radius:var(--rs);padding:8px 16px;font-family:var(--sans);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;border:1px solid var(--border);text-transform:uppercase;box-shadow:2px 2px 0px var(--border);}
.btn-p{background:var(--t1);color:var(--bg);}
.btn-p:hover{background:var(--accent);transform:translate(1px,1px);box-shadow:1px 1px 0px var(--border);border-color:var(--border);}
.btn-g{background:var(--surface);color:var(--t1);}
.btn-g:hover{background:var(--surface-2);transform:translate(1px,1px);box-shadow:1px 1px 0px var(--border);}
.ibtn{background:var(--surface);border:1px solid var(--border);color:var(--t1);border-radius:0;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.1s;font-family:var(--sans);box-shadow:1px 1px 0px var(--border);flex-shrink:0;line-height:1.3;}
.ibtn:hover{transform:translate(1px,1px);box-shadow:none;background:var(--surface-2);border-color:var(--border);color:var(--t1);}
.ibtn-r{color:var(--red);}
.ibtn-g{color:var(--green);}

/* ── ADD TASK ── */
.add-task-row{display:flex;gap:8px;align-items:center;padding-top:12px;margin-top:10px;border-top:1px dashed var(--border);}
.add-task-hint{padding-top:12px;margin-top:10px;border-top:1px dashed var(--border);}

/* ── REST DAY ── */
.rest-banner{background:var(--surface);border:2px solid var(--border);border-radius:0;padding:40px 32px;text-align:center;box-shadow:8px 8px 0px var(--border);}
.rest-banner-title{font-family:var(--serif);font-size:32px;font-weight:400;font-style:italic;color:var(--t1);margin-bottom:8px;}
.rest-banner-sub{font-size:14px;color:var(--t3);font-family:var(--sans);}

/* ── HEATMAP ── */
.hm-outer{overflow-x:auto;padding-bottom:8px;}
.hm-grid{display:flex;flex-direction:column;gap:5px;min-width:max-content;}
.hm-row{display:flex;align-items:center;gap:4px;}
.hm-label{width:170px;min-width:170px;font-size:12px;font-weight:600;color:var(--t2);text-align:right;padding-right:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--sans);}
.hm-cell{width:20px;height:20px;border-radius:0;background:var(--surface-3);border:1px solid var(--border);flex-shrink:0;transition:background 0.15s;}
.hm-cell.hm-done{background:var(--green);border-color:var(--border);}
.hm-cell.hm-today{border:2px solid var(--accent);}
.hm-cell.hm-done.hm-today{background:var(--green);border:2px solid var(--accent);}
.hm-date-cell{width:20px;flex-shrink:0;font-size:9px;font-weight:700;color:var(--t3);text-align:center;line-height:1.2;font-family:var(--sans);}
.hm-legend{display:flex;align-items:center;gap:24px;margin-top:16px;padding-top:12px;border-top:1px dashed var(--border);}
.hm-legend-item{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:0.05em;}
.hm-legend-cell{width:14px;height:14px;border-radius:0;border:1px solid var(--border);flex-shrink:0;}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:95px;background:var(--bg);border-top:3px solid var(--border);display:flex;align-items:center;padding:0 32px;z-index:100;}
.sparkline-wrap{display:flex;flex-direction:column;gap:6px;padding-right:32px;}
.sparkline-label{font-size:10px;color:var(--t1);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;font-family:var(--sans);}
#sparklineCanvas{display:block;}
.bar-divider{width:1px;height:50px;background:var(--border);flex-shrink:0;margin-right:32px;}
.cd-group{display:flex;flex:1;justify-content:space-around;align-items:center;}
.cditem{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 24px;border-right:1px solid var(--border);}
.cditem:last-child{border-right:none;}
.cd-days{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--t1);line-height:1;}
.cd-label{font-size:10px;color:var(--t1);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin-top:4px;font-family:var(--sans);}
.cd-date{font-size:10px;color:var(--t3);font-family:var(--serif);font-style:italic;}

/* ── HISTORY MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(42,37,31,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px);animation:fadeIn 0.15s ease;}
.modal{background:var(--bg);border:2px solid var(--border);padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:8px 8px 0px var(--border);animation:slideUp 0.18s ease;}
.modal-sup{font-size:11px;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;font-weight:700;font-family:var(--sans);border-bottom:1px solid var(--border);display:inline-block;padding-bottom:4px;}
.modal-title{font-family:var(--serif);font-size:32px;font-weight:400;font-style:italic;color:var(--t1);margin-bottom:24px;}
/* Day pills */
.day-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.day-pill{border-radius:0;padding:6px 14px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-family:var(--sans);font-weight:600;color:var(--t1);cursor:pointer;transition:all 0.1s;white-space:nowrap;text-transform:uppercase;letter-spacing:0.05em;box-shadow:2px 2px 0px var(--border);}
.day-pill:hover{transform:translate(1px,1px);box-shadow:none;background:var(--surface-2);}
.day-pill.active{background:var(--t1);color:var(--bg);font-weight:700;box-shadow:none;transform:translate(1px,1px);}
.day-pill.has-data{border-color:var(--blue);color:var(--blue);}
.day-pill.has-data.active{background:var(--blue);border-color:var(--blue);color:var(--bg);}
/* Edit panel */
.hist-panel{background:var(--surface-2);border:1px solid var(--border);border-radius:0;padding:20px;animation:fadeSlide 0.15s ease;box-shadow:inset 2px 2px 4px rgba(0,0,0,0.05);}
.hist-section-label{font-size:10px;color:var(--t1);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin-bottom:12px;font-family:var(--sans);}
.hist-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.hist-check{width:18px;height:18px;border-radius:0;border:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.1s;}
.hist-check.on{background:var(--green);border-color:var(--border);}
.hist-label{font-size:14px;font-weight:600;color:var(--t1);flex:1;font-family:var(--sans);}
.hist-score-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px dashed var(--border);}
.hist-score-label{font-size:12px;font-weight:600;color:var(--t1);}
.hist-score-input{width:80px;padding:6px 10px;font-size:14px;font-family:var(--mono);font-weight:500;background:var(--surface);border:1px solid var(--border);border-radius:0;color:var(--t1);outline:none;box-shadow:inset 1px 1px 3px rgba(0,0,0,0.05);}
.hist-score-input:focus{border-color:var(--accent);box-shadow:inset 2px 2px 0px rgba(176,74,42,0.1);}
.hist-t2-label{font-size:10px;color:var(--t1);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin:0 0 12px;font-family:var(--sans);}
/* Modal actions */
.m-actions{display:flex;gap:12px;justify-content:flex-end;align-items:center;margin-top:24px;padding-top:20px;border-top:2px solid var(--border);}
/* Streak recomputed badge */
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:0;background:var(--accent-bg);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;font-family:var(--sans);}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes unlockPop{from{opacity:0;transform:scale(0.985)}to{opacity:1;transform:scale(1)}}
.unlock-pop{animation:unlockPop 0.22s ease;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
</style>
</head>
<body>

<header class="g-header">
  <div class="hdr-brand">
    <div class="brand-meta" id="dateDisplay">Loading...</div>
    <div class="brand-name">Daily OS</div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat">
      <div class="hdr-stat-n" id="streakCount">0</div>
      <div class="hdr-stat-l">Day Streak</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn btn-g" onclick="openHistoryModal()">• History</button>
    <button class="btn btn-g" onclick="exportJSON()">⬇ Export</button>
  </div>
</header>

<main class="main-content" id="mainContent"></main>

<div class="overlay" id="histOverlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal" id="histModal">
    <div class="modal-sup">Edit Past Day</div>
    <div class="modal-title">History</div>
    <div class="day-pills" id="dayPills"></div>
    <div id="histEditPanel"></div>
    <div class="m-actions">
      <div id="streakResult"></div>
      <button class="btn btn-g" onclick="closeHistoryModal()">Close</button>
      <button class="btn btn-p" id="histSaveBtn" onclick="saveHistoryEdit()" style="display:none;">Save changes</button>
    </div>
  </div>
</div>

<footer class="bottom-bar">
  <div class="sparkline-wrap">
    <div class="sparkline-label">IFOM Trend (14d)</div>
    <canvas id="sparklineCanvas" width="210" height="48"></canvas>
  </div>
  <div class="bar-divider"></div>
  <div class="cd-group">
    <div class="cditem"><div class="cd-days" id="cdRace">--</div><div class="cd-label">10K Race</div><div class="cd-date">May 30, 2026</div></div>
    <div class="cditem"><div class="cd-days" id="cdEnd">--</div><div class="cd-label">End of Rotation</div><div class="cd-date">June 20, 2026</div></div>
    <div class="cditem"><div class="cd-days" id="cdIFOM">--</div><div class="cd-label">IFOM CSE</div><div class="cd-date">June 29, 2026</div></div>

const DAYS_FULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SH   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TARGETS     = { race:new Date('2026-05-30T00:00:00'), end:new Date('2026-06-20T00:00:00'), ifom:new Date('2026-06-29T00:00:00'), grad:new Date('2026-07-01T00:00:00') };
const DAY_CFG     = { 0:'rest',1:'gym',2:'gym',3:'run',4:'gym',5:'both',6:'both' };

// ── STATE ──
let state       = null;
let timerIv     = null;
let midnightTmr = null;
let addTaskTier = null;
let editTask    = null;

// History modal state
let histSelectedDate = null;
let histDraft        = null; 

function defaultState(){
  // Returns the exact JSON structure provided
  return JSON.parse(JSON.stringify(PRELOADED_JSON));
}
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function p2(n){ return String(n).padStart(2,'0'); }
function dateLabel(ds){
  const d=new Date(ds+'T12:00:00');
  return `${MONTHS_SH[d.getMonth()]} ${d.getDate()}`;
}
function fullDateLabel(ds){
  const d=new Date(ds+'T12:00:00');
  return `${DAYS_FULL[d.getDay()]}, ${MONTHS_FULL[d.getMonth()]} ${d.getDate()}`;
}

// ── LOAD / SAVE ──
function loadState(){
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw){state=defaultState();return;}
    const saved=JSON.parse(raw);
    const today=todayStr();
    if(!saved.date||saved.date!==today){
      const prevDate=saved.date||today;
      const prevDow=new Date(prevDate+'T12:00:00').getDay();
      const prevDone=prevDow===0?true:tier1DoneFor(saved.tier1||{},prevDow,(saved.customTasks||[]));
      const nowD=new Date(today+'T12:00:00'),prevD=new Date(prevDate+'T12:00:00');
      const diffD=Math.round((nowD-prevD)/86400000);
      let streak=saved.streak||0;
      streak=diffD===1?(prevDone?streak+1:0):0;
      const t2snap={};
      const t2tasks=saved.tier2Tasks||[];
      t2tasks.forEach(t=>{
        if(typeof saved.tier2[t.key]==='boolean') t2snap[t.key]=saved.tier2[t.key];
        else t2snap[t.key]=!!(saved.tier2&&saved.tier2.custom&&saved.tier2.custom[t.key]);
      });
      const history=saved.history||{};
      history[prevDate]={completed:prevDone,ifomScore:(saved.tier1&&saved.tier1.ifomScore!=='')?parseFloat(saved.tier1.ifomScore):null,tier2:t2snap};
      const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-90);
      Object.keys(history).forEach(k=>{if(new Date(k+'T12:00:00')<cutoff)delete history[k];});
      
      state={
        date:today,
        tier1:{ifom:false,ifomScore:'',gym:false,run:false,whatsapp:false,custom:{}},
        tier2:{custom:{},timerRunning:false,timerRemaining:TIMER_FULL,timerEnd:null},
        tier3:{custom:{}},
        streak,
        history,
        customTasks:(saved.customTasks||[]).filter(c=>c.tier===1),
        tier2Tasks:saved.tier2Tasks?saved.tier2Tasks.map(t=>({...t})):[],
        tier3Tasks:saved.tier3Tasks?saved.tier3Tasks.map(t=>({...t})):[]
      };
      // initialize custom tasks properly in the new day
      state.customTasks.forEach(c=>{ if(!state.tier1.custom)state.tier1.custom={}; state.tier1.custom[c.id]=false; });
      state.tier2Tasks.forEach(t=>{ if(!state.tier2.custom)state.tier2.custom={}; state.tier2.custom[t.key]=false; });
      state.tier3Tasks.forEach(t=>{ if(!state.tier3.custom)state.tier3.custom={}; state.tier3.custom[t.key]=false; });
    } else {
      state={...defaultState(),...saved};
      state.history=state.history||{};
      state.customTasks=(state.customTasks||[]).filter(c=>c.tier===1);
      state.tier2Tasks=state.tier2Tasks||[];
      state.tier3Tasks=state.tier3Tasks||[];
      if(!state.tier1.custom)state.tier1.custom={};
      if(!state.tier2.custom)state.tier2.custom={};
      if(!state.tier3.custom)state.tier3.custom={};
      if(state.tier2.timerRunning&&state.tier2.timerEnd){
        const rem=Math.max(0,Math.floor((state.tier2.timerEnd-Date.now())/1000));
        state.tier2.timerRemaining=rem;
        if(rem<=0){state.tier2.timerRunning=false;state.tier2.timerRemaining=0;state.tier2.timerEnd=null;}
      }
    }
  } catch(e){console.error('loadState',e);state=defaultState();}
}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){console.error(e);}}

// ── DERIVED ──
function dow(){ return new Date().getDay(); }
function isRest(){ return dow()===0; }
function tier1DoneFor(t1,d,customTasks){
  const cfg=DAY_CFG[d];
  if(cfg==='rest')return true;
  if(!t1.ifom||!t1.whatsapp)return false;
  if(cfg==='gym'&&!t1.gym)return false;
  if(cfg==='both'&&!t1.gym&&!t1.run)return false;
  const customs=(customTasks||[]).filter(c=>c.tier===1);
  if(customs.some(c=>!(t1.custom&&t1.custom[c.id])))return false;
  return true;
}
function t1Done(){ return isRest()||tier1DoneFor(state.tier1,dow(),state.customTasks); }
function timerDone(){ return state.tier2.timerRemaining<=0; }
function t2Open(){ return isRest()||t1Done(); }

// ── TIER 3 UNLOCK ──
function t2DoneCount(){
  return (state.tier2Tasks||[]).filter(t=>getTaskDone(t.key,2)).length;
}
function t3Open(){ return isRest()||timerDone()||t2DoneCount()>=3; }

function getTaskDone(key,tier){
  const obj=tier===2?state.tier2:state.tier3;
  if(key in obj&&typeof obj[key]==='boolean')return obj[key];
  return !!(obj.custom&&obj.custom[key]);
}
function setTaskDone(key,tier,val){
  const obj=tier===2?state.tier2:state.tier3;
  if(key in obj&&typeof obj[key]==='boolean'){obj[key]=val;return;}
  if(!obj.custom)obj.custom={};
  obj.custom[key]=val;
}

// ── TIMER ──
function startTimer(){
  if(state.tier2.timerRunning||state.tier2.timerRemaining<=0)return;
  state.tier2.timerRunning=true;
  state.tier2.timerEnd=Date.now()+state.tier2.timerRemaining*1000;
  saveState();runTimerIv();render();
}
function pauseTimer(){
  if(!state.tier2.timerRunning)return;
  state.tier2.timerRemaining=Math.max(0,Math.floor((state.tier2.timerEnd-Date.now())/1000));
  state.tier2.timerRunning=false;state.tier2.timerEnd=null;
  if(timerIv){clearInterval(timerIv);timerIv=null;}
  saveState();render();
}
function runTimerIv(){
  if(timerIv)clearInterval(timerIv);
  timerIv=setInterval(()=>{
    if(!state.tier2.timerRunning){clearInterval(timerIv);timerIv=null;return;}
    const rem=Math.max(0,Math.floor((state.tier2.timerEnd-Date.now())/1000));
    state.tier2.timerRemaining=rem;updateTimerEl();
    if(rem<=0){
      state.tier2.timerRunning=false;state.tier2.timerRemaining=0;state.tier2.timerEnd=null;
      clearInterval(timerIv);timerIv=null;saveState();render();
    }
  },1000);
}
function fmtTime(s){return `${p2(Math.floor(s/60))}:${p2(s%60)}`;}
function updateTimerEl(){
  const el=document.getElementById('timerClock');
  const sb=document.getElementById('t2StartBtn');
  const pb=document.getElementById('t2PauseBtn');
  if(!el)return;
  el.textContent=fmtTime(state.tier2.timerRemaining);
  el.className='timer-clock'+(state.tier2.timerRunning?' running':'')+(state.tier2.timerRemaining===0?' done':'');
  if(sb&&pb){
    if(state.tier2.timerRemaining<=0){sb.style.display='none';pb.style.display='none';}
    else if(state.tier2.timerRunning){sb.style.display='none';pb.style.display='';}
    else{sb.style.display='';pb.style.display='none';}
  }
}

function saveHistoryEdit(){
  if(!histSelectedDate||!histDraft)return;
  const scoreVal=histDraft.ifomScore!==''?parseFloat(histDraft.ifomScore):null;
  state.history[histSelectedDate]={
    completed:histDraft.completed,
    ifomScore:(scoreVal!=null&&!isNaN(scoreVal))?scoreVal:null,
    tier2:{...histDraft.tier2}
  };
  recomputeStreak();
  saveState();
  document.getElementById('streakResult').innerHTML=
    `<span class="streak-badge">Streak recalculated: ${state.streak}</span>`;
  renderDayPills();
  drawSparkline();
  drawHeatmap();
  document.getElementById('streakCount').innerHTML=(state.streak>=3?'':'')+state.streak;
}

function recomputeStreak(){
  const today=todayStr();
  const allDates=Object.keys(state.history).filter(d=>d<today).sort();
  if(allDates.length===0){state.streak=0;return;}
  let streak=0;
  for(let i=0;i<allDates.length;i++){
    const d=allDates[i];
    const dow=new Date(d+'T12:00:00').getDay();
    const completed=dow===0?true:(state.history[d]&&state.history[d].completed)?true:false;
    if(i===0){streak=completed?1:0;continue;}
    const prev=allDates[i-1];
    const prevD=new Date(prev+'T12:00:00');
    const curD=new Date(d+'T12:00:00');
    const diff=Math.round((curD-prevD)/86400000);
    if(diff===1) streak=completed?streak+1:0;
    else streak=completed?1:0;
  }
  const lastDate=allDates[allDates.length-1];
  const lastD=new Date(lastDate+'T12:00:00');
  const todayD=new Date(today+'T12:00:00');
  const diffToday=Math.round((todayD-lastD)/86400000);
  if(diffToday>1) streak=0;
  state.streak=streak;
}

// ── SPARKLINE ──
function drawSparkline(){
  const c=document.getElementById('sparklineCanvas');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const pts=[];
  for(let i=13;i>=1;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    const h=state.history[ds];
    pts.push({v:(h&&h.ifomScore!=null)?h.ifomScore:null});
  }
  pts.push({v:state.tier1.ifomScore!==''?parseFloat(state.tier1.ifomScore):null});
  const valid=pts.filter(p=>p.v!==null);
  if(valid.length===0){ctx.font='10px Inter,sans-serif';ctx.fillStyle='#8a8377';ctx.fillText('No scores yet',6,H/2+4);return;}
  const pad={t:6,b:6,l:5,r:5},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const vals=valid.map(p=>p.v);let mn=Math.min(...vals),mx=Math.max(...vals);
  if(mn===mx){mn=Math.max(0,mn-5);mx=Math.min(100,mx+5);}
  const rng=mx-mn||1;
  const xOf=i=>pad.l+(i/(pts.length-1))*cW;
  const yOf=v=>pad.t+cH-((v-mn)/rng)*cH;
  let fi=0;for(let i=0;i<pts.length;i++){if(pts[i].v!==null){fi=i;break;}}
  let li=pts.length-1;for(let i=pts.length-1;i>=0;i--){if(pts[i].v!==null){li=i;break;}}
  ctx.beginPath();let started=false;
  for(let i=0;i<pts.length;i++){
    if(pts[i].v===null){started=false;continue;}
    if(!started){ctx.moveTo(xOf(i),yOf(pts[i].v));started=true;}else ctx.lineTo(xOf(i),yOf(pts[i].v));
  }
  ctx.lineTo(xOf(li),pad.t+cH);ctx.lineTo(xOf(fi),pad.t+cH);ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
  grad.addColorStop(0,'rgba(44, 82, 130, 0.2)');grad.addColorStop(1,'rgba(44, 82, 130, 0)');
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();started=false;
  for(let i=0;i<pts.length;i++){
    if(pts[i].v===null){started=false;continue;}
    if(!started){ctx.moveTo(xOf(i),yOf(pts[i].v));started=true;}else ctx.lineTo(xOf(i),yOf(pts[i].v));
  }
  ctx.strokeStyle='#2c5282';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  valid.forEach(p=>{
    const i=pts.indexOf(p),isLast=i===li;
    const x=xOf(i),y=yOf(p.v);
    ctx.beginPath();ctx.arc(x,y,isLast?4:2.5,0,Math.PI*2);
    ctx.fillStyle=isLast?'#b04a2a':'#2c5282';ctx.fill();
    if(isLast){
      ctx.strokeStyle='#fdfbf7';ctx.lineWidth=1.5;ctx.stroke();
      ctx.font=`bold 10px 'DM Mono',monospace`;ctx.fillStyle='#b04a2a';
      const lbl=`${Math.round(p.v)}%`,lw=ctx.measureText(lbl).width;
      ctx.fillText(lbl,Math.min(x-lw/2,W-pad.r-lw),y>pad.t+12?y-7:y+14);
    }
  });
}

// ── HEATMAP ──
function drawHeatmap(){
  const container=document.getElementById('hmGrid');
  if(container)container.innerHTML=buildHeatmapRows();
}
function buildHeatmapRows(){
  const today=todayStr();
  const days=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`);}
  const tasks=state.tier2Tasks||[];
  let html=`<div class="hm-row"><div class="hm-label"></div>`;
  days.forEach((d,i)=>{
    const show=i===0||i===6||i===13||i===20||i===29;
    const dt=new Date(d+'T12:00:00');
    html+=`<div class="hm-date-cell">${show?`${dt.getMonth()+1}/${dt.getDate()}`:''}</div>`;
  });
  html+=`</div>`;
  tasks.forEach(task=>{
    html+=`<div class="hm-row"><div class="hm-label" title="${task.label}">${task.label}</div>`;
    days.forEach(d=>{
      const isToday=d===today;
      let done=false;
      if(isToday){done=getTaskDone(task.key,2);}
      else{const h=state.history[d];if(h&&h.tier2)done=!!h.tier2[task.key];}
      html+=`<div class="hm-cell${done?' hm-done':''}${isToday?' hm-today':''}"></div>`;
    });
    html+=`</div>`;
  });
  return html;
}

// ── COUNTDOWNS ──
function updateCountdowns(){
  const now=new Date();now.setHours(0,0,0,0);
  [['cdRace',TARGETS.race],['cdEnd',TARGETS.end],['cdIFOM',TARGETS.ifom],['cdGrad',TARGETS.grad]].forEach(([id,t])=>{
    const td=new Date(t);td.setHours(0,0,0,0);
    const el=document.getElementById(id);
    if(el)el.textContent=Math.max(0,Math.ceil((td-now)/86400000));
  });
}

// ── RENDER ──
function render(){
  const today=new Date(),d=dow();
  document.getElementById('dateDisplay').textContent=`${DAYS_FULL[d]}, ${MONTHS_FULL[today.getMonth()]} ${today.getDate()}`;
  const s=state.streak;
  document.getElementById('streakCount').innerHTML=(s>=3?'':'')+s;
  const mc=document.getElementById('mainContent');
  let html='';
  if(isRest()){
    mc.className='main-content rest-layout';
    html+=renderRestBanner()+renderTier2(true)+renderTier3(true,false);
  } else {
    mc.className='main-content';
    html+=renderTier1()+renderTier2(t2Open())+renderTier3(t3Open(),false);
  }
  html+=renderHeatmapSection();
  mc.innerHTML=html;
  const inp=document.getElementById('ifomScoreInput');
  if(inp){
    inp.addEventListener('input',e=>setIfomScore(e.target.value));
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>e.stopPropagation());
  }
  if(state.tier2.timerRunning&&!timerIv)runTimerIv();
  updateTimerEl();updateCountdowns();drawSparkline();
}

// ── RENDER HELPERS ──
function renderRestBanner(){
  return `<div class="rest-banner"><div class="rest-banner-title">Rest Day 🌿</div><div class="rest-banner-sub">No essentials today. All tiers unlocked. Recover well.</div></div>`;
}
function renderTier1(){
  const t1=state.tier1,cfg=DAY_CFG[dow()],done=t1Done();
  const customs=(state.customTasks||[]).filter(c=>c.tier===1);
  let items=chkFixed('ifom',t1.ifom,'50 IFOM questions + review','t1Toggle');
  if(t1.ifom)items+=`<div class="ifom-score-row"><span class="ifom-score-label">Score:</span><input type="number" class="ifom-score-input" id="ifomScoreInput" value="${t1.ifomScore}" min="0" max="100" placeholder="0–100"/><span class="ifom-score-pct">%</span></div>`;
  if(cfg==='gym')items+=chkFixed('gym',t1.gym,'Gym session','t1Toggle');
  else if(cfg==='both')items+=`<div class="gr-row">${chkFixed('gym',t1.gym,'Gym','t1Toggle')}${chkFixed('run',t1.run,'Run','t1Toggle')}</div><p class="gr-hint">Either counts · both can be marked</p>`;
  items+=chkFixed('whatsapp',t1.whatsapp,'WhatsApp cleared','t1Toggle');
  customs.forEach(c=>items+=chkT1Custom(c.id,!!(t1.custom&&t1.custom[c.id]),c.label));
  items+=addTaskArea(1);
  const congrats=done?`<div class="success-notice"><span style="font-size:16px;">✓</span><span class="success-notice-text">All essentials done. Tier 2 is unlocked.</span></div>`:'';
  return `<div class="tier-card"><div class="tier-header-bar"><div class="tier-badge t1">Tier 1</div><div class="tier-title">Essentials</div><div class="tier-subtitle">${done?'✓ Complete':'Complete all'}</div></div><div class="tier-body">${items}${congrats}</div></div>`;
}
function renderTier2(unlocked){
  const t2=state.tier2,td=timerDone(),count=t2DoneCount(),total=(state.tier2Tasks||[]).length;
  const lockNote=!unlocked?`<div class="lock-notice"><div class="lock-notice-icon">🔒</div><div class="lock-notice-text"><strong>Locked.</strong> Complete all Tier 1 essentials first.</div></div>`:'';
  let progressNote='';
  if(unlocked&&!td&&count>0&&count<3){
    const need=3-count;
    progressNote=`<div class="partial-notice"><div class="partial-notice-text">🔵 ${count}/${Math.min(3,total)} tasks done — complete ${need} more to unlock Tier 3 early.</div></div>`;
  }
  let items=(state.tier2Tasks||[]).map(task=>chkEditable(task,getTaskDone(task.key,2),!unlocked,2)).join('');
  items+=addTaskArea(2);
  let timerHtml='';
  if(unlocked){
    let btns='';
    if(td)btns=`<span style="font-size:13px;font-weight:700;color:var(--green);font-family:var(--sans);">✓ Tier 3 unlocked</span>`;
    else if(t2.timerRunning)btns=`<button class="btn btn-g" id="t2PauseBtn" onclick="pauseTimer()">⏸ Pause</button>`;
    else btns=`<button class="btn btn-p" id="t2StartBtn" onclick="startTimer()">${t2.timerRemaining===TIMER_FULL?'▶ Start 60-min Focus':'▶ Resume'}</button>`;
    timerHtml=`<div class="timer-section"><div class="timer-label">Focus Timer · also unlocks Tier 3</div><div class="timer-row"><div class="timer-clock${t2.timerRunning?' running':''}${td?' done':''}" id="timerClock">${fmtTime(t2.timerRemaining)}</div><div style="display:flex;gap:12px;align-items:center;">${btns}</div></div></div>`;
  }
  return `<div class="tier-card${!unlocked?' locked-tier':''} ${unlocked?'unlock-pop':''}"><div class="tier-header-bar"><div class="tier-badge ${unlocked?'t2':'tlock'}">${unlocked?'Tier 2':'🔒 Tier 2'}</div><div class="tier-title">Deep work</div><div class="tier-subtitle">${unlocked?(td||count>=3?'✓ Tier 3 unlocked':'3 tasks or 60-min timer'):'Locked'}</div></div><div class="tier-body">${lockNote}${progressNote}${items}${timerHtml}</div></div>`;
}
function renderTier3(unlocked,animate){
  const lockMsg=t2DoneCount()>=3
    ?'Let the Tier 2 focus timer reach zero, or complete 3 tasks.'
    :'Complete 3 Tier 2 tasks, or let the focus timer reach zero.';
  const lockNote=!unlocked?`<div class="lock-notice"><div class="lock-notice-icon">🔒</div><div class="lock-notice-text"><strong>Locked.</strong> ${lockMsg}</div></div>`:'';
  let items=(state.tier3Tasks||[]).map(task=>chkEditable(task,getTaskDone(task.key,3),!unlocked,3)).join('');
  items+=addTaskArea(3);
  return `<div class="tier-card${!unlocked?' locked-tier':''}${animate?' unlock-pop':''}"><div class="tier-header-bar"><div class="tier-badge ${unlocked?'t3':'tlock'}">${unlocked?'Tier 3':'🔒 Tier 3'}</div><div class="tier-title">Recreation</div><div class="tier-subtitle">${unlocked?'Earned.':'Locked'}</div></div><div class="tier-body">${lockNote}${items}</div></div>`;
}
function renderHeatmapSection(){
  return `<div class="heatmap-section"><div class="tier-card"><div class="tier-header-bar"><div class="tier-badge t2">Tier 2</div><div class="tier-title">Deep Work Habits</div><div class="tier-subtitle">Last 30 days</div></div><div class="tier-body"><div class="hm-outer"><div class="hm-grid" id="hmGrid">${buildHeatmapRows()}</div></div><div class="hm-legend"><div class="hm-legend-item"><div class="hm-legend-cell" style="background:var(--green);"></div>Completed</div><div class="hm-legend-item"><div class="hm-legend-cell" style="background:var(--surface-3);border:1px solid var(--border);"></div>Not done</div><div class="hm-legend-item"><div class="hm-legend-cell" style="background:var(--surface-3);border:2px solid var(--accent);"></div>Today</div></div></div></div></div>`;
}

// ── ITEM BUILDERS ──
function chkSvg(){return `<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function chkFixed(field,checked,label,toggleFn){
  return `<div class="check-item${checked?' done':''}" onclick="${toggleFn}('${field}')"><div class="check-box">${checked?chkSvg():''}</div><div class="check-label">${label}</div></div>`;
}
function chkT1Custom(id,checked,label){
  return `<div class="check-item${checked?' done':''}" id="ct1-${id}" onclick="ctToggle1('${id}')"><div class="check-box">${checked?chkSvg():''}</div><div class="check-label">${label}</div><div class="item-actions"><button class="ibtn ibtn-r" onclick="deleteCustomT1('${id}');event.stopPropagation();" title="Delete">×</button></div></div>`;
}
function chkEditable(task,checked,locked,tier){
  const isEditing=editTask&&editTask.tier===tier&&editTask.key===task.key;
  const cls='check-item'+(checked?' done':'')+(locked?' locked':'')+(isEditing?' editing':'');
  const escaped=task.label.replace(/"/g,'&quot;');
  if(isEditing){
    return `<div class="${cls}"><div class="check-box">${checked?chkSvg():''}</div><input type="text" class="inline-input" id="editInput" value="${escaped}" onkeydown="handleEditKey(event)" onclick="event.stopPropagation()"/><button class="ibtn ibtn-g" onclick="confirmEdit();event.stopPropagation();" title="Save">✓</button><button class="ibtn" onclick="cancelEdit();event.stopPropagation();" title="Cancel">✕</button></div>`;
  }
  const oc=locked?'':`onclick="tierToggle(${tier},'${task.key}')"`;
  return `<div class="${cls}" id="tk-${task.key}" ${oc}><div class="check-box">${checked?chkSvg():''}</div><div class="check-label">${task.label}</div><div class="item-actions"><button class="ibtn" onclick="startEdit(${tier},'${task.key}');event.stopPropagation();" title="Rename">✎</button><button class="ibtn ibtn-r" onclick="deleteTaskFromTier(${tier},'${task.key}');event.stopPropagation();" title="Delete">×</button></div></div>`;
}
function addTaskArea(tier){
  if(addTaskTier===tier)return `<div class="add-task-row"><input type="text" class="inline-input" id="addTaskInput" placeholder="Task name..." onkeydown="handleAddKey(event)"/><button class="ibtn ibtn-g" onclick="confirmAdd()" title="Add">✓</button><button class="ibtn" onclick="cancelAdd()" title="Cancel">✕</button></div>`;
  return `<div class="add-task-hint"><button class="btn btn-g" onclick="showAddForm(${tier})" style="font-size:10px;">+ Add task</button></div>`;
}

// ── MIDNIGHT ──
function scheduleMidnight(){
  if(midnightTmr)clearTimeout(midnightTmr);
  const now=new Date();
  const ms=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,1)-now;
  midnightTmr=setTimeout(()=>{if(timerIv){clearInterval(timerIv);timerIv=null;}loadState();render();scheduleMidnight();},ms);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHistoryModal();});

// ── INIT ──
function init(){loadState();render();scheduleMidnight();setInterval(updateCountdowns,60000);}
init();
</script>
